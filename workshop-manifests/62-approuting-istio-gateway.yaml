# App Routing Gateway API (`approuting-istio`) — Gateway + HTTPRoute
# 5-4 핸즈온 ③에서 사용
#
# 사전 요구:
#   az feature register ... AppRoutingIstioGatewayAPIPreview
#   az feature register ... ManagedGatewayAPIPreview
#   az aks update --enable-gateway-api
#   az aks update --enable-app-routing-istio
#   kubectl patch svc store-front/store-admin -n pets → ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: pets-gateway
  namespace: pets
spec:
  gatewayClassName: approuting-istio
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pets-store-front-route
  namespace: pets
spec:
  parentRefs:
    - name: pets-gateway
  rules:
    # /admin/* → store-admin (prefix를 / 로 재작성)
    - matches:
        - path:
            type: PathPrefix
            value: /admin
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: store-admin
          port: 80
    # 그 외 → store-front
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: store-front
          port: 80
